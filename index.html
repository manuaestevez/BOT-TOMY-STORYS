<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Bot — Tomy Medina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #f5a623;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --green: #2ecc71;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 16px;
    margin-left: 4px;
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* LEFT PANEL — CONTROLS */
  .panel-left {
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .btn-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-opt:hover { border-color: var(--accent); color: var(--text); }
  .btn-opt.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .textarea-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
    transition: border-color 0.15s;
    width: 100%;
  }
  .textarea-field:focus { outline: none; border-color: var(--accent); }
  .textarea-field::placeholder { color: var(--text-muted); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  .generate-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 20px;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .generate-btn:hover { background: #ffc040; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #00000033;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }


  /* RIGHT PANEL — OUTPUT */
  .panel-right {
    padding: 28px 32px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .output-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
  }
  .output-empty .icon { font-size: 48px; opacity: 0.3; }
  .output-empty p { font-size: 14px; line-height: 1.6; max-width: 300px; }

  /* STORY CARDS */
  .stories-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stories-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .stories-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .copy-all-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
  }
  .copy-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .story-card:hover { border-color: #333; }

  .story-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .story-card-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .story-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
    background: #f5a62320;
    border: 1px solid #f5a62333;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .story-type-badge {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .copy-btn:hover { border-color: var(--green); color: var(--green); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .story-card-body {
    padding: 16px;
  }

  /* Formatted story display */
  .story-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
  }

  .story-visual-hint {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tag-thymos { background: #7c3aed20; color: #a78bfa; border: 1px solid #7c3aed40; }
  .tag-rep { background: #0369a120; color: #38bdf8; border: 1px solid #0369a140; }
  .tag-crec { background: #15803d20; color: #4ade80; border: 1px solid #15803d40; }
  .tag-venta { background: #f5a62320; color: var(--accent); border: 1px solid #f5a62340; }
  .tag-placa { background: #ef444420; color: #f87171; border: 1px solid #ef444440; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .header { padding: 16px 20px; }
    .panel-left, .panel-right { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">STORY BOT</div>
  <div class="header-sub">Tomy Medina × IG Historias</div>
</header>

<div class="main">

  <!-- LEFT: CONTROLS -->
  <aside class="panel-left">

    <div class="field-group">
      <div class="field-label">Tipo de historia</div>
      <div class="btn-group" id="tipo-group">
        <button class="btn-opt active" data-val="secuencia-larga">Secuencia larga (5-7)</button>
        <button class="btn-opt" data-val="secuencia-corta">Secuencia corta (2-3)</button>
        <button class="btn-opt" data-val="placa">Placa única</button>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Tono</div>
      <div class="btn-group" id="tono-group">
        <button class="btn-opt active" data-val="Íntimo">🤝 Íntimo</button>
        <button class="btn-opt" data-val="Directo">⚡ Directo</button>
        <button class="btn-opt" data-val="Autoridad">🏆 Autoridad</button>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Palabra clave del CTA</div>
      <textarea class="textarea-field" id="cta-input" placeholder='Ej: INFO, TEST, POSTRE, CAMBIO...' style="min-height:48px;resize:none;"></textarea>
    </div>

    <div class="field-group">
      <div class="field-label">Nivel de consciencia</div>
      <div class="btn-group" id="nivel-group">
        <button class="btn-opt" data-val="1">N1 — Inconsciente</button>
        <button class="btn-opt" data-val="2">N2 — Consciente dolor</button>
        <button class="btn-opt active" data-val="3">N3 — Busca solución</button>
        <button class="btn-opt" data-val="4">N4 — Conoce a Tomy</button>
        <button class="btn-opt" data-val="5">N5 — Listo para comprar</button>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Objetivo</div>
      <div class="btn-group" id="objetivo-group">
        <button class="btn-opt active" data-val="Venta directa">💰 Venta</button>
        <button class="btn-opt" data-val="Autoridad">🏆 Autoridad</button>
        <button class="btn-opt" data-val="Captación">🎣 Captación</button>
        <button class="btn-opt" data-val="Emoción / conexión">❤️ Emoción</button>
      </div>
    </div>

    <hr class="divider">

    <div class="field-group">
      <div class="field-label">Tema o contexto (opcional)</div>
      <textarea class="textarea-field" id="tema-input" placeholder="Ej: mostrar el resultado de un cliente que tenía poco tiempo, o hablar de que los suplementos no son lo más importante..."></textarea>
    </div>

    <button class="generate-btn" id="generate-btn" onclick="generateStories()">
      <div class="spinner"></div>
      <span class="btn-label">GENERAR HISTORIAS</span>
    </button>

  </aside>

  <!-- RIGHT: OUTPUT -->
  <section class="panel-right" id="output-panel">
    <div class="output-empty" id="empty-state">
      <div class="icon">✦</div>
      <p>Elegí los parámetros y generá tu secuencia de historias lista para copiar.</p>
    </div>
  </section>

</div>

<script>
// --- State ---
const state = {
  tipo: 'secuencia-larga',
  tono: 'Intimo',
  nivel: '3',
  objetivo: 'Venta directa',
  cta: '',
  tema: ''
};

function initToggleGroup(groupId, stateKey) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.btn-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state[stateKey] = btn.dataset.val;
    });
  });
}
initToggleGroup('tipo-group', 'tipo');
initToggleGroup('tono-group', 'tono');
initToggleGroup('nivel-group', 'nivel');
initToggleGroup('objetivo-group', 'objetivo');

document.getElementById('cta-input').addEventListener('input', e => { state.cta = e.target.value; });
document.getElementById('tema-input').addEventListener('input', e => { state.tema = e.target.value; });

async function generateStories() {
  const btn = document.getElementById('generate-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  const panel = document.getElementById('output-panel');
  panel.innerHTML = '<div class="output-empty"><div class="icon" style="opacity:1">✦</div><p style="color:#f5a623">Generando historias...</p></div>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
     headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: getSystemPrompt(),
        messages: [{ role: "user", content: buildPrompt() }]
      })
    });

    const data = await response.json();
    if (data.error) { renderError(data.error.message); return; }
    const text = (data.content || []).map(i => i.text || '').join('');
    renderOutput(text);

  } catch (err) {
    renderError(err.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function getSystemPrompt() {
  return "Sos un experto en copywriting de Instagram Stories para Tomy Medina, entrenador fitness online de 23 anios de La Plata, Argentina.\n\nPERFIL DE TOMY:\n- Especializado en biomecanica y ciencia aplicada al entrenamiento\n- Asesorias 1-1 de 90 dias, high ticket\n- Tono: directo, argentino relajado, sin floro\n- Lenguaje: voseo rioplatense, frases cortas, impacto rapido\n- Avatar ideal: Julian, profesional 20-35 anios, ocupado, quiere resultados reales\n\nNIVELES DE CONSCIENCIA:\n- N1: No sabe que tiene un problema. Identificacion por estilo de vida.\n- N2: Sabe que algo esta mal. Validar el dolor.\n- N3: Busca solucion, compara opciones. Demostrar que Tomy es la mejor.\n- N4: Ya conoce a Tomy. Necesita prueba social y certeza.\n- N5: Listo para comprar. Escasez y CTA directo.\n\nFORMATO DE RESPUESTA:\nDevolved SOLO JSON valido, sin texto extra, sin backticks. Formato exacto:\n{\"tipo\":\"secuencia\",\"historias\":[{\"numero\":1,\"etapa\":\"HOOK\",\"visual\":\"descripcion foto/video sugerido\",\"texto\":\"texto exacto en pantalla\"}]}\n\nREGLAS:\n- Maximo 4 lineas por historia, frases cortas\n- Maximo 1-2 emojis por historia\n- El CTA usa SIEMPRE la palabra clave indicada\n- Hook con intriga o dolor inmediato\n- Voseo rioplatense siempre";
}

function buildPrompt() {
  const tipoLabel = { 'secuencia-larga': 'secuencia larga de 6 historias', 'secuencia-corta': 'secuencia corta de 3 historias', 'placa': 'placa unica de 1 historia' }[state.tipo];
  const nivelDesc = { '1': 'N1 inconsciente del problema', '2': 'N2 consciente del dolor', '3': 'N3 buscando solucion', '4': 'N4 conoce a Tomy necesita prueba social', '5': 'N5 listo para comprar necesita escasez' }[state.nivel];

  let p = "Genera una " + tipoLabel + " para Instagram Stories de Tomy Medina.\n\nPARAMETROS:\n- Tono: " + state.tono + "\n- Nivel de consciencia: " + nivelDesc + "\n- Objetivo: " + state.objetivo + "\n- Palabra clave CTA: " + (state.cta.trim() || 'INFO');
  if (state.tema.trim()) p += "\n- Tema: " + state.tema;
  if (state.tipo === 'secuencia-larga') p += "\n\nEstructura: Hook > Contexto quien es Tomy > Body caso prueba > Body 2 refuerzo > Emocion > CTA";
  else if (state.tipo === 'secuencia-corta') p += "\n\nEstructura: Hook > Body > CTA";
  else p += "\n\nUna sola historia con Hook + desarrollo + CTA condensados.";
  return p;
}

function renderOutput(rawText) {
  const panel = document.getElementById('output-panel');
  let data;
  try {
    const clean = rawText.replace(/```json|```/g, '').trim();
    data = JSON.parse(clean);
  } catch (e) {
    renderError('No se pudo parsear la respuesta: ' + rawText.substring(0, 100));
    return;
  }

  const tonoTag = { 'Intimo': 'tag-thymos', 'Directo': 'tag-rep', 'Autoridad': 'tag-crec' }[state.tono] || 'tag-rep';
  const tipoLabel = { 'secuencia-larga': 'Secuencia larga', 'secuencia-corta': 'Secuencia corta', 'placa': 'Placa unica' }[state.tipo];

  let html = '<div class="stories-header"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><div class="stories-title">' + tipoLabel + '</div><span class="tag ' + tonoTag + '">' + state.tono + '</span><span class="tag" style="background:#fff1;border:1px solid #fff2;color:#999">N' + state.nivel + '</span></div><div style="display:flex;align-items:center;gap:8px;"><div class="stories-meta">' + data.historias.length + ' pantallas</div><button class="copy-all-btn" onclick="copyAll()">Copiar todo</button></div></div>';

  data.historias.forEach((h) => {
    const textEsc = encodeURIComponent(h.texto);
    const textoSafe = h.texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += '<div class="story-card"><div class="story-card-header"><div class="story-card-left"><span class="story-number">HISTORIA ' + h.numero + '</span><span class="story-type-badge">' + h.etapa + '</span></div><button class="copy-btn" onclick="copyStory(this)" data-text="' + textEsc + '">Copiar</button></div><div class="story-card-body"><div class="story-text">' + textoSafe + '</div>' + (h.visual ? '<div class="story-visual-hint">📸 ' + h.visual + '</div>' : '') + '</div></div>';
  });

  window._lastStories = data.historias;
  panel.innerHTML = html;
}

function renderError(msg) {
  document.getElementById('output-panel').innerHTML = '<div class="output-empty"><div class="icon" style="opacity:1">✗</div><p>Error: ' + (msg || 'Intentá de nuevo') + '</p></div>';
}

function copyStory(btn) {
  navigator.clipboard.writeText(decodeURIComponent(btn.dataset.text)).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  if (!window._lastStories) return;
  const text = window._lastStories.map(h => '— HISTORIA ' + h.numero + ' [' + h.etapa + '] —\n' + h.texto + (h.visual ? '\n📸 ' + h.visual : '')).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = '✓ Copiado todo';
    setTimeout(() => btn.textContent = 'Copiar todo', 2000);
  });
}
</script>
</body>
</html>
